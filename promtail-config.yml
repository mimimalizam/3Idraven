server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Čita logove iz svih Docker kontejnera na hostu
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Ime kontejnera kao labela
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'

      # Docker Compose project (stack ime)
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'compose_project'

      # Docker Compose service
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'compose_service'

      # Custom labela: stack (logging.stack iz docker-compose labels)
      - source_labels: ['__meta_docker_container_label_logging_stack']
        target_label: 'stack'

      # Custom labela: app (logging.app iz docker-compose labels)
      - source_labels: ['__meta_docker_container_label_logging_app']
        target_label: 'app'

      # Custom labela: environment
      - source_labels: ['__meta_docker_container_label_logging_env']
        target_label: 'env'

    pipeline_stages:
      # Parsira Docker JSON log format
      - docker: {}
